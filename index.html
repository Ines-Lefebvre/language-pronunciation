<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LANGUAGE — Pronunciation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0c0c; --surface: #141414; --border: #252525;
  --amber: #e8a43b; --amber-dim: rgba(232,164,59,0.12);
  --green: #4caf7d; --red: #e05757;
  --text: #d4d4d4; --muted: #4a4a4a;
  --mono: 'IBM Plex Mono', monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; overflow: hidden; user-select: none; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.4; }

.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 32px 56px; transition: opacity 0.35s, transform 0.35s; }
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }

/* START */
#screen-start { gap: 48px; }
.logo { font-size: clamp(36px, 9vw, 72px); font-weight: 600; letter-spacing: 0.4em; color: var(--amber); text-shadow: 0 0 60px rgba(232,164,59,0.2); }
.tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.3em; text-transform: uppercase; margin-top: -36px; }
.lang-selector { display: flex; gap: 12px; }
.btn-lang { padding: 14px 36px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: var(--mono); font-size: 13px; font-weight: 400; letter-spacing: 0.15em; cursor: pointer; transition: all 0.2s; border-radius: 1px; outline: none; }
.btn-lang:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.btn-lang:active { transform: scale(0.97); }
.start-note { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; }

/* SESSION */
#screen-session { justify-content: space-between; }
.top-bar { width: 100%; display: flex; flex-direction: column; gap: 14px; }
.top-row { display: flex; justify-content: space-between; align-items: center; }
.header-logo { font-size: 11px; letter-spacing: 0.35em; color: var(--amber); opacity: 0.7; }
.progress-text { font-size: 12px; color: var(--muted); }
.progress-track { width: 100%; height: 1px; background: var(--border); }
.progress-fill { height: 1px; background: var(--amber); transition: width 0.6s ease; width: 0%; box-shadow: 0 0 8px rgba(232,164,59,0.4); }

.card-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; width: 100%; }
.lang-badge { font-size: 10px; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; border: 1px solid var(--border); padding: 4px 14px; border-radius: 1px; }
.word-wrap { display: flex; align-items: center; gap: 20px; }
.word-display { font-size: clamp(48px, 13vw, 120px); font-weight: 600; color: var(--text); letter-spacing: 0.04em; line-height: 1; text-align: center; transition: opacity 0.25s; }
.word-display.fading { opacity: 0; }
.replay-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; outline: none; align-self: flex-end; margin-bottom: 6px; }
.replay-btn:hover { color: var(--amber); border-color: var(--amber); }
.replay-btn svg { width: 14px; height: 14px; fill: currentColor; }
.phonetic { font-size: 15px; font-weight: 300; color: var(--muted); letter-spacing: 0.05em; font-style: italic; min-height: 22px; }

.bottom-area { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
.feedback { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; min-height: 18px; transition: all 0.3s; opacity: 0; }
.feedback.show { opacity: 1; }
.feedback.ok { color: var(--green); }
.feedback.fail { color: var(--red); }

.record-btn { width: 76px; height: 76px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; outline: none; position: relative; -webkit-tap-highlight-color: transparent; }
.record-btn::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid transparent; transition: all 0.3s; }
.record-btn:hover { border-color: rgba(232,164,59,0.4); }
.record-btn.recording { border-color: var(--red); background: rgba(224,87,87,0.08); }
.record-btn.recording::before { border-color: rgba(224,87,87,0.2); animation: ring 1.4s ease-out infinite; }
.record-btn.sending { border-color: rgba(232,164,59,0.4); background: var(--amber-dim); }
.record-btn svg { transition: all 0.2s; fill: var(--text); }
.record-btn.recording svg { fill: var(--red); }
.record-btn.sending svg { fill: var(--amber); animation: spin 1s linear infinite; }
@keyframes ring { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.5); opacity: 0; } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.status { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; min-height: 16px; }

/* END */
#screen-end { gap: 28px; }
.end-label { font-size: 11px; letter-spacing: 0.25em; color: var(--muted); text-transform: uppercase; }
.end-score { font-size: clamp(56px, 14vw, 104px); font-weight: 600; color: var(--amber); text-shadow: 0 0 40px rgba(232,164,59,0.25); }
.end-sublabel { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }
.btn-restart { padding: 13px 32px; border: 1px solid var(--amber); background: none; color: var(--amber); font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 1px; margin-top: 12px; transition: all 0.2s; outline: none; }
.btn-restart:hover { background: var(--amber-dim); }
</style>
</head>
<body>

<!-- START -->
<div class="screen" id="screen-start">
  <div class="logo">LANGUAGE</div>
  <div class="tagline">Pronunciation Training</div>
  <div class="lang-selector">
    <button class="btn-lang" onclick="startSession('en')">ENGLISH</button>
    <button class="btn-lang" onclick="startSession('es')">ESPAÑOL</button>
  </div>
  <div class="start-note">listen · repeat · validate</div>
</div>

<!-- SESSION -->
<div class="screen hidden" id="screen-session">
  <div class="top-bar">
    <div class="top-row">
      <div class="header-logo">LANGUAGE</div>
      <div class="progress-text" id="progress-text">0 / 0</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="card-area">
    <div class="lang-badge" id="lang-badge">EN</div>
    <div class="word-wrap">
      <div style="width:56px"></div>
      <div class="word-display" id="word-display">—</div>
      <button class="replay-btn" id="replay-btn" onclick="replayAudio()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <div class="phonetic" id="phonetic"></div>
  </div>
  <div class="bottom-area">
    <div class="feedback" id="feedback"></div>
    <button class="record-btn" id="record-btn" onclick="handleRecordClick()">
      <svg id="record-icon" width="26" height="26" viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
      </svg>
    </button>
    <div class="status" id="status">tap to record</div>
  </div>
</div>

<!-- END -->
<div class="screen hidden" id="screen-end">
  <div class="end-label">Session complete</div>
  <div class="end-score" id="end-score">—</div>
  <div class="end-sublabel" id="end-sublabel">words correct</div>
  <button class="btn-restart" onclick="resetApp()">New Session</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const N8N = 'https://n8n.srv833062.hstgr.cloud/webhook';

// ─── STATE ───────────────────────────────────────────────────────────────────
let session = { id: null, langue: null, words: [], currentIndex: 0, correct: 0 };
let currentAudioB64 = '';
let appState = 'idle'; // idle | recording | sending
let mediaRecorder = null;
let audioChunks = [];
let micStream = null;

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ─── START SESSION ────────────────────────────────────────────────────────────
async function startSession(lang) {
  show('screen-session');
  document.getElementById('lang-badge').textContent = lang.toUpperCase();
  setStatus('loading...');
  setWord('—');

  try {
    const resp = await fetch(`${N8N}/start-session?lang=${lang}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    session.id = data.session_id;
    session.langue = data.langue;
    session.words = data.words;
    session.currentIndex = 0;
    session.correct = 0;

    currentAudioB64 = data.audio_base64 || '';
    renderCard(data.words[0]);
    if (currentAudioB64) setTimeout(() => playB64(currentAudioB64), 300);
  } catch(e) {
    console.error(e);
    setStatus('connection error');
  }
}

// ─── CARD ─────────────────────────────────────────────────────────────────────
function renderCard(word) {
  const wd = document.getElementById('word-display');
  wd.classList.add('fading');
  setTimeout(() => {
    setWord(word);
    wd.classList.remove('fading');
  }, 200);
  document.getElementById('phonetic').textContent = '';
  hideFeedback();
  updateProgress();
  setStatus('tap to record');
  appState = 'idle';
  syncBtn();
}

function setWord(w) { document.getElementById('word-display').textContent = w || '—'; }

function updateProgress() {
  const idx = session.currentIndex, total = session.words.length;
  document.getElementById('progress-text').textContent = `${idx} / ${total}`;
  document.getElementById('progress-fill').style.width = `${total ? (idx / total) * 100 : 0}%`;
}

// ─── AUDIO PLAYBACK ───────────────────────────────────────────────────────────
function playB64(b64) {
  if (!b64) return;
  try {
    const audio = new Audio(`data:audio/mp3;base64,${b64}`);
    audio.play().catch(err => console.warn('Autoplay blocked:', err));
  } catch(e) { console.error('playB64 error', e); }
}

function replayAudio() { playB64(currentAudioB64); }

// ─── RECORDING ───────────────────────────────────────────────────────────────
function handleRecordClick() {
  if (appState === 'idle') beginRecording();
  else if (appState === 'recording') endRecording();
  // sending → ignore clicks
}

async function beginRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    setStatus('microphone not supported');
    return;
  }
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    console.error('getUserMedia error:', e);
    setStatus('mic access denied');
    return;
  }

  audioChunks = [];

  // Pick best supported mime type
  const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', ''].find(
    m => m === '' || MediaRecorder.isTypeSupported(m)
  );

  try {
    mediaRecorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
  } catch(e) {
    console.error('MediaRecorder init error:', e);
    setStatus('recorder error');
    stopMic();
    return;
  }

  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    stopMic();
    submitAudio();
  };

  mediaRecorder.onerror = e => {
    console.error('MediaRecorder error:', e);
    stopMic();
    appState = 'idle';
    setStatus('recording error — try again');
    syncBtn();
  };

  mediaRecorder.start(100); // collect chunks every 100ms
  appState = 'recording';
  setStatus('recording... tap to stop');
  syncBtn();
}

function endRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  appState = 'sending';
  setStatus('evaluating...');
  syncBtn();
}

function stopMic() {
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

async function submitAudio() {
  const word     = session.words[session.currentIndex];
  const nextWord = session.words[session.currentIndex + 1] || '';

  if (audioChunks.length === 0) {
    setStatus('no audio — try again');
    appState = 'idle'; syncBtn(); return;
  }

  const mimeType = mediaRecorder ? (mediaRecorder.mimeType || 'audio/webm') : 'audio/webm';
  const ext = mimeType.includes('ogg') ? 'ogg' : 'webm';
  const blob = new Blob(audioChunks, { type: mimeType });

  const fd = new FormData();
  fd.append('audio',      blob, `rec.${ext}`);
  fd.append('session_id', session.id);
  fd.append('card_index', session.currentIndex);
  fd.append('mot',        word);
  fd.append('next_word',  nextWord);
  fd.append('langue',     session.langue);

  try {
    const resp = await fetch(`${N8N}/check`, { method: 'POST', body: fd });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    handleResult(data);
  } catch(e) {
    console.error('submit error:', e);
    setStatus('error — try again');
    appState = 'idle'; syncBtn();
  }
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function handleResult(data) {
  if (data.resultat === 'correct') {
    session.correct++;
    showFeedback('ok', '✓ correct');

    currentAudioB64 = data.audio_base64 || '';
    if (currentAudioB64) setTimeout(() => playB64(currentAudioB64), 200);

    session.currentIndex = data.next_index;

    setTimeout(() => {
      if (session.currentIndex >= session.words.length) {
        endSession();
      } else {
        renderCard(session.words[session.currentIndex]);
      }
    }, 1600);

  } else {
    if (data.phonetique) {
      document.getElementById('phonetic').textContent = `/ ${data.phonetique} /`;
    }
    showFeedback('fail', '✗ try again');

    currentAudioB64 = data.audio_base64 || '';
    if (currentAudioB64) setTimeout(() => playB64(currentAudioB64), 500);

    appState = 'idle';
    setStatus('tap to record');
    syncBtn();
  }
}

// ─── END SESSION ──────────────────────────────────────────────────────────────
function endSession() {
  const total = session.words.length;
  document.getElementById('end-score').textContent = `${session.correct}/${total}`;
  document.getElementById('end-sublabel').textContent =
    `word${session.correct !== 1 ? 's' : ''} correct · ${Math.round(session.correct / total * 100)}%`;
  show('screen-end');
}

function resetApp() {
  stopMic();
  session = { id: null, langue: null, words: [], currentIndex: 0, correct: 0 };
  currentAudioB64 = '';
  appState = 'idle';
  show('screen-start');
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = `feedback show ${type}`;
}
function hideFeedback() { document.getElementById('feedback').className = 'feedback'; }

const MIC_PATH  = 'M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z';
const STOP_PATH = 'M6 6h12v12H6z';
const SPIN_PATH = 'M12 6v-2A8 8 0 0 1 20 12h2A10 10 0 0 0 12 2v2zm0 2a6 6 0 0 0-6 6H4A8 8 0 0 1 12 4v4zM12 20v2A10 10 0 0 1 2 12h2a8 8 0 0 0 8 8v2z';

function syncBtn() {
  const btn  = document.getElementById('record-btn');
  const icon = document.getElementById('record-icon');
  btn.className = 'record-btn';
  if (appState === 'recording') {
    btn.classList.add('recording');
    icon.innerHTML = `<path d="${STOP_PATH}"/>`;
  } else if (appState === 'sending') {
    btn.classList.add('sending');
    icon.innerHTML = `<path d="${SPIN_PATH}"/>`;
  } else {
    icon.innerHTML = `<path d="${MIC_PATH}"/>`;
  }
}
</script>
</body>
</html>
